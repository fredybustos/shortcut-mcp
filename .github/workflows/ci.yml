name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate semver version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Check version format
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Local version: $VERSION"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Version '$VERSION' is not valid semver (expected x.y.z)"
            exit 1
          fi

          echo "✅ Valid semver: $VERSION"

      - name: Check version was bumped
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view shortcut-mcp version 2>/dev/null || echo "0.0.0")

          echo "Local:     $VERSION"
          echo "Published: $PUBLISHED"

          if [ "$VERSION" = "$PUBLISHED" ]; then
            echo "❌ Version '$VERSION' is the same as the published version. Bump package.json before merging."
            exit 1
          fi

          echo "✅ Version bumped: $PUBLISHED → $VERSION"

  build:
    name: Install & Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
        env:
          SHORTCUT_API_TOKEN: test-token

  smoke-test:
    name: MCP Server smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify server starts and exposes all tools
        run: |
          RESPONSE=$(printf \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}\n{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}\n' \
            | SHORTCUT_API_TOKEN=ci-fake-token node dist/main.js 2>/dev/null)

          TOOLS=(
            "search_user_by_email"
            "get_user_epics_by_email"
            "get_user_stories_by_email"
            "get_user_work_by_email"
            "get_stories_by_due_date"
          )

          FAILED=0
          for tool in "${TOOLS[@]}"; do
            if echo "$RESPONSE" | grep -q "\"$tool\""; then
              echo "✅ $tool"
            else
              echo "❌ $tool — not found in server response"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "Server response:"
            echo "$RESPONSE"
            exit 1
          fi

          echo ""
          echo "All tools registered correctly."
